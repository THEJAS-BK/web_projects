<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="my-20 mx-56 flex flex-wrap border-2 border-black-600">
      <div
        class="h-24 w-full bg-linear-to-t from-sky-500 to-indigo-500 text-white flex justify-center items-center font-bold"
      >
        NEWS YOU CAN TRUST
      </div>
      <div class="text-center my-4 w-full">
        <h3 class="font-bold">Stay up to date with the latest!</h3>
        <p>
          subscribe to our newsletter for the latest news straight into your
          inbox.
        </p>
        <form class="flex flex-wrap">
          <input
            type="text"
            placeholder="your@gmail.com"
            class="w-full mx-47 bg-slate-200 text-center placeholder:text-small mt-4 p-1"
          />
          <button
            class="bg-blue-600 text-white rounded-full p-2 w-full mx-56 mt-4 mb-4"
          >
            Submit
          </button>
        </form>
        <p>We care about your privacy</p>
      </div>
    </div>
  </body>
</html>
