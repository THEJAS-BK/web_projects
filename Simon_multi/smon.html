<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simon multiplayer</title>
    <link rel="icon" href="./29327f40e9c4d26b.webp" />
    <link rel="stylesheet" href="simon.css" />
  </head>
  <body>
    <div class="start_menu">
      <div class="head">ENTER YOUR NAMES</div>
      <div class="start_menu_inp">
        <input type="text" id="player1" placeholder="Player1" />
        <input type="text" id="player2" placeholder="Player2" />
      </div>
      <div class="start_menu_btns">
        <button class="start">START</button>
      </div>
    </div>
    <div class="pattern message">Follow the pattern</div>
    <main>
      <div class="game">
        <button class="game1 p1game"></button>
        <button class="game1 p1game"></button>
        <button class="game1 p1game"></button>
        <button class="game1 p1game"></button>
      </div>
      <div class="game">
        <button class="game1 p2game"></button>
        <button class="game1 p2game"></button>
        <button class="game1 p2game"></button>
        <button class="game1 p2game"></button>
      </div>
    </main>
    <footer></footer>

    <script src="simon.js"></script>
  </body>
</html>
